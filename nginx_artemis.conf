# /etc/nginx/sites-available/artemis
# Flask handles authentication — no Basic Auth needed here

server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;

    ssl_certificate     /etc/ssl/certs/artemis.crt;
    ssl_certificate_key /etc/ssl/private/artemis.key;

    # Disable buffering — required for SSE live log streaming
    proxy_buffering off;
    proxy_cache     off;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Required for Server-Sent Events
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;
    }
}
