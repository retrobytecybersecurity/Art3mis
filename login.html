<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTEMIS // Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #eef3f8;
    --bg-accent: #e4edf5;
    --panel: rgba(255, 255, 255, 0.78);
    --panel-strong: rgba(255, 255, 255, 0.92);
    --input: #f8fbfd;
    --accent: #6fa8c9;
    --accent-strong: #4b89ad;
    --text: #1f2a37;
    --dim: #6b7a8c;
    --border: #d7e2ec;
    --error: #c84c63;
    --shadow: 0 20px 50px rgba(31, 42, 55, 0.08);

    --dog-brown: #a86a3a;
    --dog-brown-dark: #7a4a28;
    --dog-white: #ffffff;
    --dog-nose: #7b4b3a;
    --dog-line: #2f3e4e;
    --dog-eye: #2d2d2d;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(111, 168, 201, 0.18), transparent 30%),
      radial-gradient(circle at bottom right, rgba(75, 137, 173, 0.12), transparent 28%),
      linear-gradient(160deg, var(--bg) 0%, var(--bg-accent) 100%);
    padding: 24px;
  }

  .login-wrap {
    width: 100%;
    max-width: 430px;
  }

  .logo-block {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-title {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text);
  }

  .logo-sub {
    font-size: 0.78rem;
    color: var(--dim);
    margin-top: 6px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  /* Dog logo */
  .dog-logo {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto 16px;
    filter: drop-shadow(0 14px 24px rgba(75, 137, 173, 0.10));
  }

  .dog-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px solid rgba(111, 168, 201, 0.35);
    background: rgba(255, 255, 255, 0.22);
  }

  .dog-ear {
    position: absolute;
    width: 48px;
    height: 58px;
    background: var(--dog-brown);
    border: 3px solid var(--dog-line);
    top: 10px;
    z-index: 1;
  }

  .dog-ear.left {
    left: 12px;
    transform: rotate(-20deg);
    border-radius: 60% 40% 50% 50%;
  }

  .dog-ear.right {
    right: 12px;
    transform: rotate(20deg);
    border-radius: 40% 60% 50% 50%;
  }

  .dog-head {
    position: absolute;
    left: 50%;
    top: 25px;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid var(--dog-line);
    background:
      linear-gradient(
        to right,
        var(--dog-brown) 0%,
        var(--dog-brown) 45%,
        var(--dog-white) 45%,
        var(--dog-white) 55%,
        var(--dog-brown) 55%
      );
    z-index: 2;
  }

  .dog-eye {
    position: absolute;
    width: 8px;
    height: 10px;
    background: var(--dog-eye);
    border-radius: 50%;
    top: 32px;
  }

  .dog-eye.left { left: 22px; }
  .dog-eye.right { right: 22px; }

  .dog-eye::after {
    content: "";
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
  }

  .dog-snout {
    position: absolute;
    left: 50%;
    top: 45px;
    transform: translateX(-50%);
    width: 60px;
    height: 40px;
    background: white;
    border-radius: 50%;
    border: 3px solid var(--dog-line);
  }

  .dog-nose {
    position: absolute;
    left: 50%;
    top: 48px;
    transform: translateX(-50%);
    width: 32px;
    height: 22px;
    background: var(--dog-nose);
    border-radius: 50%;
    border: 3px solid var(--dog-line);
    z-index: 3;
  }

  .dog-nose::before,
  .dog-nose::after {
    content: "";
    position: absolute;
    width: 5px;
    height: 8px;
    background: #5a3428;
    border-radius: 50%;
    top: 6px;
  }

  .dog-nose::before { left: 7px; }
  .dog-nose::after  { right: 7px; }

  .dog-mouth {
    position: absolute;
    left: 50%;
    top: 70px;
    transform: translateX(-50%);
    width: 24px;
    height: 10px;
    z-index: 3;
  }

  .dog-mouth::before,
  .dog-mouth::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 8px;
    border-bottom: 2px solid var(--dog-line);
    border-radius: 0 0 10px 10px;
  }

  .dog-mouth::before { left: 0; }
  .dog-mouth::after { right: 0; }

  .card {
    background: var(--panel);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.75);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .card-header {
    padding: 16px 22px;
    background: rgba(111, 168, 201, 0.08);
    border-bottom: 1px solid var(--border);
    color: var(--accent-strong);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .card-body {
    padding: 26px 22px 22px;
  }

  label {
    display: block;
    font-size: 0.76rem;
    font-weight: 600;
    color: var(--dim);
    margin-bottom: 8px;
    margin-top: 18px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  label:first-child {
    margin-top: 0;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    padding: 13px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  input::placeholder {
    color: #98a6b5;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(111, 168, 201, 0.16);
    background: #ffffff;
  }

  .btn-login {
    width: 100%;
    margin-top: 24px;
    padding: 13px 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
    box-shadow: 0 10px 24px rgba(75, 137, 173, 0.22);
  }

  .btn-login:hover {
    transform: translateY(-1px);
    filter: brightness(1.02);
  }

  .btn-login:active {
    transform: translateY(0);
  }

  .error-msg {
    background: rgba(200, 76, 99, 0.08);
    border: 1px solid rgba(200, 76, 99, 0.28);
    border-radius: 12px;
    color: var(--error);
    font-size: 0.84rem;
    padding: 10px 12px;
    margin-top: 14px;
    text-align: center;
  }

  .footer-note {
    text-align: center;
    color: var(--dim);
    font-size: 0.73rem;
    margin-top: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .login-wrap {
      max-width: 100%;
    }

    .logo-title {
      font-size: 1.65rem;
    }

    .card-body,
    .card-header {
      padding-left: 18px;
      padding-right: 18px;
    }

    .dog-logo {
      width: 124px;
      height: 124px;
    }
  }
</style>
</head>
<body>
<div class="login-wrap">

  <div class="logo-block">
    <div class="dog-logo" aria-hidden="true">
      <div class="dog-ring"></div>
      <div class="dog-ear left"></div>
      <div class="dog-ear right"></div>

      <div class="dog-head">
        <div class="dog-eye left"></div>
        <div class="dog-eye right"></div>
        <div class="dog-snout"></div>
        <div class="dog-nose"></div>
        <div class="dog-mouth"></div>
      </div>
    </div>

    <div class="logo-title">ARTEMIS</div>
    <div class="logo-sub">External Pentest Suite</div>
  </div>

  <div class="card">
    <div class="card-header">Authorized Access Only</div>
    <div class="card-body">
      <form method="POST" action="/login">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          name="username"
          autocomplete="username"
          autofocus
          placeholder="Enter your username"
        >

        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          name="password"
          autocomplete="current-password"
          placeholder="Enter your password"
        >

        <button type="submit" class="btn-login">Sign In</button>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
      </form>
    </div>
  </div>

  <div class="footer-note">ARTEMIS // Confidential System</div>
</div>
</body>
</html>
